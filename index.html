<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Takeover Support</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0F0F16;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 40px;
      background: #181820;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #A1A1B3;
      font-size: 16px;
      margin-bottom: 30px;
    }

    .email {
      display: inline-block;
      padding: 14px 24px;
      background: #6C5CE7;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: 0.2s;
    }

    .email:hover {
      background: #5848d6;
    }

    .footer {
      margin-top: 25px;
      font-size: 13px;
      color: #6D6D7A;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Takeover Support</h1>
    <p>
      Need help, have feedback, or found a bug?<br/>
      We're here for you.
    </p>

    <a href="mailto:support@takeoverapp.com" class="email">
      Contact Support
    </a>

    <div class="footer">
      © 2026 Takeover App
    </div>
  </div>

</body>
</html>
